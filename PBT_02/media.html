<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Giới thiệu sản phẩm</title>
</head>
<body>

<h1>Giới thiệu iPhone 16</h1>

<figure>
  <img src="img1.jpg" alt="iPhone 16 mặt trước" loading="lazy"
       style="max-width:100%; height:auto;">
  <figcaption>Mặt trước iPhone 16</figcaption>
</figure>

<figure>
  <img src="img2.jpg" alt="iPhone 16 mặt sau" loading="lazy"
       style="max-width:100%; height:auto;">
  <figcaption>Mặt sau iPhone 16</figcaption>
</figure>

<figure>
  <img src="img3.jpg" alt="iPhone 16 góc nghiêng" loading="lazy"
       style="max-width:100%; height:auto;">
  <figcaption>Thiết kế góc nghiêng</figcaption>
</figure>

<hr>
<h2>Video giới thiệu</h2>
<iframe width="560" height="315"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        title="Video giới thiệu sản phẩm"
        allowfullscreen>
</iframe>

<hr>

<h2>Video sản phẩm</h2>
<video controls poster="poster.jpg" width="560">
  <source src="video.mp4" type="video/mp4">
  <source src="video.webm" type="video/webm">
  Trình duyệt không hỗ trợ video.
</video>

<hr>

<h2>Nhạc nền</h2>
<audio controls>
  <source src="audio.mp3" type="audio/mpeg">
  Trình duyệt không hỗ trợ audio.
</audio>

<hr>

<h2>Logo đơn giản</h2>
<svg width="100" height="100">
  <circle cx="50" cy="50" r="40" fill="blue" />
</svg>

</body>
</html>
