<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký tài khoản</title>
</head>
<body>

<form action="#" method="POST">
  <fieldset>
    <legend>Thông tin cá nhân</legend>

    <label for="fullname">Họ tên:</label>
    <input type="text" id="fullname" name="fullname" equired minlength="2" maxlength="50" placeholder="Nhập họ tên">
    <br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required placeholder="example@gmail.com">
    <br><br>

    <label for="phone">Số điện thoại:</label>
    <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="10 chữ số">

    <br><br>

    <label for="dob">Ngày sinh:</label>
    <input type="date" id="dob" name="dob" max="2026-01-01" placeholder="Chọn ngày">

  </fieldset>

  <br>

  <fieldset>
    <legend>Tài khoản</legend>

    <label for="username">Username:</label>
    <input type="text" id="username" name="username" pattern="[a-zA-Z0-9_]{3,20}" placeholder="3-20 ký tự">

    <br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" placeholder="Ít nhất 8 ký tự, 1 chữ hoa, 1 số">

    <br><br>

    <label for="confirm">Xác nhận password:</label>
    <input type="password" id="confirm" name="confirm" minlength="8" placeholder="Nhập lại password">

  </fieldset>

  <br>

  <fieldset>
    <legend>Thông tin giao hàng</legend>
    <label for="city">Thành phố:</label>
    <select id="city" name="city">
      <option>Hà Nội</option>
      <option>TP.HCM</option>
      <option>Đà Nẵng</option>
      <option>Hải Phòng</option>
      <option>Cần Thơ</option>
    </select>

    <br><br>

    <label for="district">Quận/Huyện:</label>
    <select id="district" name="district">
      <option>Quận 1</option>
      <option>Quận 2</option>
      <option>Quận 3</option>
    </select>

    <br><br>

    <label for="address">Địa chỉ chi tiết:</label>
    <textarea id="address" name="address" rows="3" placeholder="Nhập địa chỉ"></textarea>

    <br><br>

    <p>Giới tính:</p>
    <input type="radio" id="male" name="gender">
    <label for="male">Nam</label>
    <input type="radio" id="female" name="gender">
    <label for="female">Nữ</label>
    <input type="radio" id="other" name="gender">
    <label for="other">Khác</label>

  </fieldset>

  <br>

  <input type="checkbox" id="agree" required>
  <label for="agree">Tôi đồng ý điều khoản</label>

  <br><br>

  <button type="submit">Đăng ký</button>
  <button type="reset">Nhập lại</button>

</form>

</body>
</html>
